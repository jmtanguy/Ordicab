name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to publish (example: v1.0.0-beta.2)'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            package_command: npm run package:mac
            artifact_name: macos-artifacts
          - os: windows-latest
            package_command: npm run package:win
            artifact_name: windows-artifacts

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure macOS signing and notarization env
        if: matrix.os == 'macos-14'
        shell: bash
        run: |
          echo "CSC_LINK=${{ secrets.MAC_CSC_LINK }}" >> "$GITHUB_ENV"
          echo "CSC_KEY_PASSWORD=${{ secrets.MAC_CSC_KEY_PASSWORD }}" >> "$GITHUB_ENV"
          APPLE_API_KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          printf "%s" "${{ secrets.APPLE_API_KEY_P8 }}" > "$APPLE_API_KEY_PATH"
          chmod 600 "$APPLE_API_KEY_PATH"
          echo "APPLE_API_KEY=$APPLE_API_KEY_PATH" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_ID=${{ secrets.APPLE_API_KEY_ID }}" >> "$GITHUB_ENV"
          echo "APPLE_API_ISSUER=${{ secrets.APPLE_API_ISSUER }}" >> "$GITHUB_ENV"

      # Windows signing is optional for early-stage releases.
      # This step configures signing only when both Windows signing secrets are configured.
      - name: Configure Windows signing env (optional)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          if [ -n "${{ secrets.WIN_CSC_LINK }}" ] && [ -n "${{ secrets.WIN_CSC_KEY_PASSWORD }}" ]; then
            echo "CSC_LINK=${{ secrets.WIN_CSC_LINK }}" >> "$GITHUB_ENV"
            echo "CSC_KEY_PASSWORD=${{ secrets.WIN_CSC_KEY_PASSWORD }}" >> "$GITHUB_ENV"
            echo "Windows signing: enabled"
          else
            echo "Windows signing: disabled (missing WIN_CSC_LINK/WIN_CSC_KEY_PASSWORD)"
          fi

      - name: Build release artifacts
        run: ${{ matrix.package_command }}

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: out/make/**
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-artifacts'
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.tag_name }}
          target_commitish: ${{ github.sha }}
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.zip
            release-assets/**/*setup.exe
            release-assets/**/*.yml
            release-assets/**/*.blockmap
